<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

</head>
<body>
<main>
  <div class="card">
    <img class="card__qrcode" width="288px" height="288px" src="./images/image-qr-code.png" alt="qr-code">
    <div class="card__attribution">
    
    <h1 class="attribution__title">Improve your front-end skills by building projects</h1>
  
    <p class="attribution__text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level.</p>
  
    <p class="attribution__text">Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by <a href="#">Yevhenii</a></p>
  </div></div></main>
</body>
</html>
